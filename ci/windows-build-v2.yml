name: Windows Build v2 (log capture)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    name: Windows x64 (VS 2022, verbose)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure (MSVC x64)
        shell: pwsh
        run: |
          cmake --version | Tee-Object -FilePath configure.log
          cmake -B build -G "Visual Studio 17 2022" -A x64 2>&1 | Tee-Object -Append -FilePath configure.log
          if ($LASTEXITCODE -ne 0) {
            Write-Host "VS 2022 generator unavailable or failed - retrying with the runner default generator"
            Remove-Item -Recurse -Force build -ErrorAction SilentlyContinue
            cmake -B build -A x64 2>&1 | Tee-Object -Append -FilePath configure.log
          }
          exit $LASTEXITCODE

      - name: Build Release
        shell: pwsh
        run: |
          cmake --build build --config Release --parallel 2>&1 | Tee-Object -FilePath build.log
          exit $LASTEXITCODE

      - name: Run headless verification suite
        shell: pwsh
        run: |
          & "build/YDCoreTests_artefacts/Release/YDCoreTests.exe" 2>&1 | Tee-Object -FilePath tests.log
          exit $LASTEXITCODE

      - name: Package artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "build/YDCore_artefacts/Release/VST3/YD Core.vst3" -DestinationPath "dist/YDCore-VST3-Windows-x64.zip"
          Compress-Archive -Path "build/YDCore_artefacts/Release/Standalone/YD Core.exe" -DestinationPath "dist/YDCore-Standalone-Windows-x64.zip"

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: YDCore-VST3-Windows-x64
          path: dist/YDCore-VST3-Windows-x64.zip

      - name: Upload Standalone
        uses: actions/upload-artifact@v4
        with:
          name: YDCore-Standalone-Windows-x64
          path: dist/YDCore-Standalone-Windows-x64.zip

      - name: Publish binaries to the rolling release
        if: github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete ci-latest --yes --cleanup-tag 2>$null
          if ($LASTEXITCODE -ne 0) { Write-Host "no previous ci-latest release" }
          gh release create ci-latest `
            "dist/YDCore-VST3-Windows-x64.zip" `
            "dist/YDCore-Standalone-Windows-x64.zip" `
            --title "YD Core 1.0.0 - Windows x64 (CI build)" `
            --notes "Automated Windows x64 Release build (VST3 + Standalone), commit ${{ github.sha }}. Install: unzip and copy 'YD Core.vst3' to C:\Program Files\Common Files\VST3, then rescan plugins in FL Studio."
          exit 0

      - name: Publish debug logs on failure
        if: failure()
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete ci-debug --yes --cleanup-tag 2>$null
          if ($LASTEXITCODE -ne 0) { Write-Host "no previous ci-debug release" }
          $files = @()
          foreach ($f in @("configure.log", "build.log", "tests.log")) {
            if (Test-Path $f) { $files += $f }
          }
          if ($files.Count -eq 0) { "no logs captured" | Out-File nolog.txt; $files = @("nolog.txt") }
          gh release create ci-debug @files --prerelease `
            --title "CI debug logs (run ${{ github.run_id }})" `
            --notes "Logs from the failed Windows build of commit ${{ github.sha }}."
          exit 0
