name: Windows Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write   # allows the job to publish binaries to the rolling release

jobs:
  windows:
    name: Windows x64 (Visual Studio 2022)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache JUCE
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: juce-8.0.15-windows-${{ hashFiles('CMakeLists.txt') }}

      - name: Configure (VS 17 2022, x64)
        run: cmake -B build -G "Visual Studio 17 2022" -A x64

      - name: Build Release (VST3 + Standalone + tests)
        run: cmake --build build --config Release --parallel

      - name: Run headless verification suite
        run: build/YDCoreTests_artefacts/Release/YDCoreTests.exe

      - name: Package artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "build/YDCore_artefacts/Release/VST3/YD Core.vst3" -DestinationPath "dist/YDCore-VST3-Windows-x64.zip"
          Compress-Archive -Path "build/YDCore_artefacts/Release/Standalone/YD Core.exe" -DestinationPath "dist/YDCore-Standalone-Windows-x64.zip"
          Get-ChildItem dist

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: YDCore-VST3-Windows-x64
          path: dist/YDCore-VST3-Windows-x64.zip

      - name: Upload Standalone
        uses: actions/upload-artifact@v4
        with:
          name: YDCore-Standalone-Windows-x64
          path: dist/YDCore-Standalone-Windows-x64.zip

      - name: Publish binaries to the rolling release
        if: github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete ci-latest --yes --cleanup-tag 2>$null
          if ($LASTEXITCODE -ne 0) { Write-Host "no previous ci-latest release" }
          gh release create ci-latest `
            "dist/YDCore-VST3-Windows-x64.zip" `
            "dist/YDCore-Standalone-Windows-x64.zip" `
            --title "YD Core 1.0.0 - Windows x64 (CI build)" `
            --notes "Automated Windows x64 Release build (VST3 + Standalone), commit ${{ github.sha }}. Install: unzip and copy 'YD Core.vst3' to C:\Program Files\Common Files\VST3, then rescan plugins in FL Studio."
          exit 0

  linux:
    name: Linux x64 (verification)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libasound2-dev libx11-dev libxcomposite-dev \
            libxcursor-dev libxext-dev libxinerama-dev libxrandr-dev libxrender-dev \
            libfreetype6-dev libfontconfig1-dev libglu1-mesa-dev mesa-common-dev

      - name: Cache JUCE
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: juce-8.0.15-linux-${{ hashFiles('CMakeLists.txt') }}

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Run headless verification suite
        run: ./build/YDCoreTests_artefacts/Release/YDCoreTests
