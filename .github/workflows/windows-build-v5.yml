name: GLOBUS CI (Windows x64)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    name: Build, sign (when available), install-test, publish
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure (MSVC x64)
        shell: pwsh
        run: |
          cmake --version | Tee-Object -FilePath configure.log
          cmake -B build -G "Visual Studio 17 2022" -A x64 2>&1 | Tee-Object -Append -FilePath configure.log
          if ($LASTEXITCODE -ne 0) {
            Write-Host "VS 2022 generator unavailable or failed - retrying with the runner default generator"
            Remove-Item -Recurse -Force build -ErrorAction SilentlyContinue
            cmake -B build -A x64 2>&1 | Tee-Object -Append -FilePath configure.log
          }
          exit $LASTEXITCODE

      - name: Build Release
        shell: pwsh
        run: |
          cmake --build build --config Release --parallel 2>&1 | Tee-Object -FilePath build.log
          exit $LASTEXITCODE

      - name: Run headless verification suite
        shell: pwsh
        run: |
          & "build/YDCoreTests_artefacts/Release/YDCoreTests.exe" 2>&1 | Tee-Object -FilePath tests.log
          exit $LASTEXITCODE

      # ------------------------------------------------------------------
      # Code signing (Azure Trusted Signing) — runs ONLY when the repository
      # has the required encrypted secrets configured. Without them the build
      # continues and every artifact is clearly labeled as unsigned.
      # No certificates, keys or passwords are ever committed to the repo.
      # ------------------------------------------------------------------
      - name: Detect signing credentials
        id: signcheck
        shell: pwsh
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ACS_ENDPOINT: ${{ secrets.ACS_ENDPOINT }}
          ACS_ACCOUNT: ${{ secrets.ACS_ACCOUNT }}
          ACS_PROFILE: ${{ secrets.ACS_PROFILE }}
        run: |
          $vars = @($env:AZURE_TENANT_ID, $env:AZURE_CLIENT_ID, $env:AZURE_CLIENT_SECRET,
                    $env:ACS_ENDPOINT, $env:ACS_ACCOUNT, $env:ACS_PROFILE)
          $available = -not ($vars | Where-Object { [string]::IsNullOrEmpty($_) })
          "available=$($available.ToString().ToLower())" | Out-File $env:GITHUB_OUTPUT -Append
          Write-Host "Signing credentials available: $available"

      - name: Sign plugin binaries (Azure Trusted Signing)
        if: steps.signcheck.outputs.available == 'true'
        uses: azure/trusted-signing-action@v0.5.1
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.ACS_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.ACS_ACCOUNT }}
          certificate-profile-name: ${{ secrets.ACS_PROFILE }}
          files: |
            ${{ github.workspace }}\build\YDCore_artefacts\Release\VST3\GLOBUS.vst3\Contents\x86_64-win\GLOBUS.vst3
            ${{ github.workspace }}\build\YDCore_artefacts\Release\Standalone\GLOBUS.exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Verify binary signatures
        if: steps.signcheck.outputs.available == 'true'
        shell: pwsh
        run: |
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" |
                      Sort-Object FullName -Descending | Select-Object -First 1
          & $signtool.FullName verify /pa /all /v "build/YDCore_artefacts/Release/VST3/GLOBUS.vst3/Contents/x86_64-win/GLOBUS.vst3" 2>&1 | Tee-Object -FilePath signing.log
          if ($LASTEXITCODE -ne 0) { exit 1 }
          & $signtool.FullName verify /pa /all /v "build/YDCore_artefacts/Release/Standalone/GLOBUS.exe" 2>&1 | Tee-Object -Append -FilePath signing.log
          exit $LASTEXITCODE

      - name: Generate installer artwork
        shell: pwsh
        run: |
          python -m pip install --quiet pillow
          python tools/gen_installer_assets.py

      - name: Compile installer (Inno Setup)
        shell: pwsh
        run: |
          "locating Inno Setup..." | Tee-Object -FilePath iscc.log
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            "Inno Setup not preinstalled - installing via chocolatey" | Tee-Object -Append -FilePath iscc.log
            choco install innosetup -y --no-progress 2>&1 | Select-Object -Last 5 | Tee-Object -Append -FilePath iscc.log
          }
          if (-not (Test-Path $iscc)) {
            $shim = Get-Command iscc -ErrorAction SilentlyContinue
            if ($null -ne $shim) { $iscc = $shim.Source }
          }
          "using: $iscc" | Tee-Object -Append -FilePath iscc.log
          if (-not (Test-Path $iscc)) {
            "FATAL: ISCC.exe not found after install" | Tee-Object -Append -FilePath iscc.log
            exit 1
          }
          & $iscc "installer\GLOBUS-Installer.iss" 2>&1 | Tee-Object -Append -FilePath iscc.log
          exit $LASTEXITCODE

      - name: Sign installer (Azure Trusted Signing)
        if: steps.signcheck.outputs.available == 'true'
        uses: azure/trusted-signing-action@v0.5.1
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.ACS_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.ACS_ACCOUNT }}
          certificate-profile-name: ${{ secrets.ACS_PROFILE }}
          files: |
            ${{ github.workspace }}\installer\Output\GLOBUS-Installer-Windows-x64.exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Verify installer signature
        if: steps.signcheck.outputs.available == 'true'
        shell: pwsh
        run: |
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" |
                      Sort-Object FullName -Descending | Select-Object -First 1
          & $signtool.FullName verify /pa /all /v "installer/Output/GLOBUS-Installer-Windows-x64.exe" 2>&1 | Tee-Object -Append -FilePath signing.log
          exit $LASTEXITCODE

      - name: Test installer (silent install, verify, uninstall)
        shell: pwsh
        run: |
          $log = "installer-test.log"
          $script:fails = 0
          function Check($name, $cond) {
            $status = if ($cond) { "[OK]" } else { "[FAIL]" }
            "$status $name" | Tee-Object -FilePath $log -Append
            if (-not $cond) { $script:fails++ }
          }

          $p = Start-Process -FilePath "installer\Output\GLOBUS-Installer-Windows-x64.exe" `
                -ArgumentList "/VERYSILENT","/SUPPRESSMSGBOXES","/NORESTART","/LOG=install.log" -Wait -PassThru
          Check "silent install exit code 0" ($p.ExitCode -eq 0)

          $vst3 = "C:\Program Files\Common Files\VST3\GLOBUS.vst3\Contents\x86_64-win\GLOBUS.vst3"
          $mod  = "C:\Program Files\Common Files\VST3\GLOBUS.vst3\Contents\Resources\moduleinfo.json"
          $sa   = "C:\Program Files\Ninth Parallel Audio\GLOBUS\GLOBUS.exe"
          Check "VST3 module installed to Common Files\VST3" (Test-Path $vst3)
          Check "VST3 moduleinfo.json installed" (Test-Path $mod)
          Check "Standalone installed" (Test-Path $sa)

          $h1 = (Get-FileHash "build/YDCore_artefacts/Release/VST3/GLOBUS.vst3/Contents/x86_64-win/GLOBUS.vst3").Hash
          $h2 = (Get-FileHash $vst3).Hash
          Check "installed VST3 hash matches build" ($h1 -eq $h2)

          $vendorOk = (Get-Content $mod -Raw) -match "Ninth Parallel Audio"
          Check "installed moduleinfo carries Ninth Parallel Audio vendor" $vendorOk

          $proc = Start-Process -FilePath $sa -PassThru
          Start-Sleep -Seconds 8
          Check "Standalone launches and keeps running" (-not $proc.HasExited)
          if (-not $proc.HasExited) { Stop-Process -Id $proc.Id -Force }

          $presetDir = Join-Path ([Environment]::GetFolderPath("MyDocuments")) "GLOBUS\Presets"
          New-Item -ItemType Directory -Force -Path $presetDir | Out-Null
          '{"name":"CI Survival","category":"User","params":{}}' | Out-File "$presetDir\CI_Survival.json" -Encoding utf8
          $legacyDir = Join-Path ([Environment]::GetFolderPath("MyDocuments")) "YDCore\Presets"
          New-Item -ItemType Directory -Force -Path $legacyDir | Out-Null
          '{"name":"Legacy Survival","category":"User","params":{}}' | Out-File "$legacyDir\Legacy_Survival.json" -Encoding utf8

          $unins = Get-ChildItem "C:\Program Files\Ninth Parallel Audio\GLOBUS\unins*.exe" | Select-Object -First 1
          Check "uninstaller registered in app folder" ($null -ne $unins)
          if ($null -ne $unins) {
            $p2 = Start-Process -FilePath $unins.FullName -ArgumentList "/VERYSILENT","/SUPPRESSMSGBOXES","/NORESTART" -Wait -PassThru
            Check "silent uninstall exit code 0" ($p2.ExitCode -eq 0)
            Start-Sleep -Seconds 6
            Check "VST3 bundle removed on uninstall" (-not (Test-Path "C:\Program Files\Common Files\VST3\GLOBUS.vst3"))
            Check "Standalone exe removed on uninstall" (-not (Test-Path $sa))
            Check "GLOBUS user presets survive uninstall" (Test-Path "$presetDir\CI_Survival.json")
            Check "legacy YDCore presets survive uninstall" (Test-Path "$legacyDir\Legacy_Survival.json")
          }

          Write-Host "----- installer test summary -----"
          Get-Content $log
          if ($script:fails -gt 0) { exit 1 }

      - name: Package artifacts + SHA-256 checksums
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "build/YDCore_artefacts/Release/VST3/GLOBUS.vst3" -DestinationPath "dist/GLOBUS-VST3-Windows-x64.zip"
          Compress-Archive -Path "build/YDCore_artefacts/Release/Standalone/GLOBUS.exe" -DestinationPath "dist/GLOBUS-Standalone-Windows-x64.zip"
          Copy-Item "installer/Output/GLOBUS-Installer-Windows-x64.exe" "dist/"
          Get-FileHash dist/* -Algorithm SHA256 | ForEach-Object {
            "$($_.Hash)  $(Split-Path $_.Path -Leaf)"
          } | Out-File "dist/SHA256SUMS.txt" -Encoding ascii
          Get-Content "dist/SHA256SUMS.txt"

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: GLOBUS-VST3-Windows-x64
          path: dist/GLOBUS-VST3-Windows-x64.zip

      - name: Upload Standalone
        uses: actions/upload-artifact@v4
        with:
          name: GLOBUS-Standalone-Windows-x64
          path: dist/GLOBUS-Standalone-Windows-x64.zip

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: GLOBUS-Installer-Windows-x64
          path: dist/GLOBUS-Installer-Windows-x64.exe

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: SHA256SUMS
          path: dist/SHA256SUMS.txt

      - name: Publish binaries to the rolling release
        if: github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          SIGNED: ${{ steps.signcheck.outputs.available }}
        run: |
          $signNote = if ($env:SIGNED -eq 'true') {
            "Binaries and installer are Authenticode-signed (SHA-256, RFC 3161 timestamp)."
          } else {
            "UNSIGNED DEVELOPMENT BUILD: binaries and installer carry no Authenticode signature yet, so Windows SmartScreen will show an Unknown Publisher warning. See docs/SIGNING.md for the signing setup."
          }
          gh release delete ci-latest --yes --cleanup-tag 2>$null
          if ($LASTEXITCODE -ne 0) { Write-Host "no previous ci-latest release" }
          gh release create ci-latest `
            "dist/GLOBUS-Installer-Windows-x64.exe" `
            "dist/GLOBUS-VST3-Windows-x64.zip" `
            "dist/GLOBUS-Standalone-Windows-x64.zip" `
            "dist/SHA256SUMS.txt" `
            --title "GLOBUS 1.1.0 - Windows x64 (CI build)" `
            --notes "Automated Windows x64 Release build by Ninth Parallel Audio. Easiest install: run GLOBUS-Installer-Windows-x64.exe (VST3 to Common Files\VST3, Standalone app, Start Menu shortcut, uninstaller; user presets are never touched). Manual install: unzip GLOBUS-VST3-Windows-x64.zip and copy 'GLOBUS.vst3' to C:\Program Files\Common Files\VST3, then rescan plugins in FL Studio. Verify downloads against SHA256SUMS.txt. $signNote Commit ${{ github.sha }}."
          exit 0

      - name: Publish debug logs on failure
        if: failure()
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete ci-debug --yes --cleanup-tag 2>$null
          if ($LASTEXITCODE -ne 0) { Write-Host "no previous ci-debug release" }
          $files = @()
          foreach ($f in @("configure.log", "build.log", "tests.log", "iscc.log", "install.log", "installer-test.log", "signing.log")) {
            if (Test-Path $f) { $files += $f }
          }
          if ($files.Count -eq 0) { "no logs captured" | Out-File nolog.txt; $files = @("nolog.txt") }
          gh release create ci-debug @files --prerelease `
            --title "CI debug logs (run ${{ github.run_id }})" `
            --notes "Logs from the failed Windows build of commit ${{ github.sha }}."
          exit 0
